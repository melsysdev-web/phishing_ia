<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>AI Phishing Detector</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">

    <header class="header">
      <span class="header-icon">🛡️</span>
      <h1 class="header-title">AI Phishing Detector</h1>
      <button class="btn-settings" id="settingsBtn" title="Configuración">⚙️</button>
    </header>

    <!-- Input de URL -->
    <div class="url-section">
      <div class="input-wrap">
        <input
          type="url"
          class="url-input"
          id="urlInput"
          placeholder="Pega o escribe una URL…"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn-paste hidden" id="pasteBtn" title="Pegar desde portapapeles"></button>
      </div>
      <button class="btn-go" id="analyzeBtn">Analizar</button>
    </div>

    <!-- Cargando -->
    <div class="state hidden" id="loadingState">
      <div class="spinner"></div>
      <p class="state-title">Analizando…</p>
      <p class="state-sub">IA · VirusTotal · Safe Browsing</p>
    </div>

    <!-- Error -->
    <div class="state hidden" id="errorState">
      <div class="state-emoji">⚠️</div>
      <p class="state-title">No se pudo analizar</p>
      <p class="state-sub" id="errorText"></p>
      <button class="btn-retry" id="retryBtn">Reintentar</button>
    </div>

    <!-- Resultado -->
    <div class="result hidden" id="result">

      <!-- Rueda de puntuación -->
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 140 140" aria-hidden="true">
          <!-- Pista -->
          <circle class="gauge-track" cx="70" cy="70" r="54"/>
          <!-- Relleno animado (inicia desde arriba, -90°) -->
          <circle class="gauge-fill" id="gaugeFill"
            cx="70" cy="70" r="54"
            transform="rotate(-90 70 70)"/>
          <!-- Número -->
          <text class="gauge-num" id="gaugeNum" x="70" y="67">0</text>
          <text class="gauge-den" x="70" y="86">/100</text>
        </svg>
        <div class="gauge-verdict" id="gaugeVerdict">—</div>
        <div class="gauge-hint"   id="gaugeHint">—</div>
      </div>

    </div>

  </div>

  <script src="../services/api_client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
